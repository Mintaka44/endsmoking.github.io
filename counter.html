<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objectif Santé - Libres ensemble</title>
    <style>
        /* Reset de base et police */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Conteneur de l'image de fond (forêt et rivière) */
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            /* Utilisation d'une image de forêt et rivière relaxante via Unsplash */
            background: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1920&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            overflow: hidden;
            padding: 20px;
        }

        /* Superposition (Overlay) animée pour simuler le flux calme de l'eau et de l'air frais */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            /* Dégradé doux turquoise/bleu avec de la transparence pour laisser passer la forêt */
            background: linear-gradient(135deg, rgba(0, 74, 97, 0.25), rgba(77, 208, 225, 0.15), rgba(0, 150, 136, 0.2));
            background-size: 400% 400%;
            animation: waterFlowCalm 20s ease-in-out infinite;
            z-index: 1;
        }

        /* Animation fluide et très calme pour donner vie à l'ambiance aquatique/forestière */
        @keyframes waterFlowCalm {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Conteneur principal (Effet Verre Dépoli / Glassmorphism de haute qualité) */
        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 3.5rem 2.5rem;
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.25);
            max-width: 650px;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 1.15rem;
            opacity: 0.95;
            margin-bottom: 2.5rem;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
        }

        /* Grille du compte à rebours */
        .countdown-grid {
            display: flex;
            justify-content: space-around;
            gap: 18px;
        }

        .time-box {
            flex: 1;
            background: rgba(255, 255, 255, 0.12);
            padding: 1.8rem 0.5rem;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.05);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .time-box:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .number {
            font-size: 3.2rem;
            font-weight: 700;
            display: block;
            line-height: 1;
            margin-bottom: 0.6rem;
            text-shadow: 0 3px 12px rgba(0, 0, 0, 0.3);
        }

        .label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.85;
            font-weight: 500;
        }

        /* Message de fin */
        #complete-message {
            font-size: 2.2rem;
            font-weight: bold;
            display: none;
            animation: breathe 3s ease-in-out infinite;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.4);
        }

        @keyframes breathe {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.04); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }

        /* Responsive */
        @media (max-width: 520px) {
            h1 { font-size: 1.9rem; }
            .subtitle { font-size: 1rem; margin-bottom: 1.8rem; }
            .number { font-size: 2.2rem; }
            .countdown-grid { gap: 10px; }
            .time-box { padding: 1.2rem 0.3rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Le Grand Départ 🚭</h1>
        <p class="subtitle">Libres, ensemble et à pleins poumons. Le décompte :</p>

        <div id="countdown" class="countdown-grid">
            <div class="time-box">
                <span class="number" id="days">00</span>
                <span class="label">Jours</span>
            </div>
            <div class="time-box">
                <span class="number" id="hours">00</span>
                <span class="label">Heures</span>
            </div>
            <div class="time-box">
                <span class="number" id="minutes">00</span>
                <span class="label">Min</span>
            </div>
            <div class="time-box">
                <span class="number" id="seconds">00</span>
                <span class="label">Sec</span>
            </div>
        </div>

        <div id="complete-message">
            C'est le moment ! Respirez l'air pur de la forêt. 🌱
        </div>
    </div>

    <script>
        // --- CONFIGURATION DE VOTRE DATE ---
        // Configuré pour le 7 août 2026 à 00h01
        const targetDate = new Date("August 7, 2026 00:00:01").getTime();
        // ------------------------------------

        const countdownGrid = document.getElementById("countdown");
        const completeMessage = document.getElementById("complete-message");

        const daysEl = document.getElementById("days");
        const hoursEl = document.getElementById("hours");
        const minutesEl = document.getElementById("minutes");
        const secondsEl = document.getElementById("seconds");

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            if (difference < 0) {
                countdownGrid.style.display = "none";
                completeMessage.style.display = "block";
                clearInterval(intervalId);
                return;
            }

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            daysEl.innerText = days < 10 ? "0" + days : days;
            hoursEl.innerText = hours < 10 ? "0" + hours : hours;
            minutesEl.innerText = minutes < 10 ? "0" + minutes : minutes;
            secondsEl.innerText = seconds < 10 ? "0" + seconds : seconds;
        }

        const intervalId = setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>

</body>
</html>
